<div class="page-container">
  <div class="header">
    <h2>{{ isEditMode ? 'Edit Lease Contract' : 'Add New Lease Contract' }}</h2>
    <button class="btn-secondary" (click)="cancel()">← Back to List</button>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading">Loading...</div>

  <!-- Error State -->
  <div *ngIf="error" class="error">{{ error }}</div>

  <!-- Form -->
  <div *ngIf="!loading" class="form-container">
    <form (ngSubmit)="onSubmit()" #contractForm="ngForm">
      
      <!-- Shop Selection -->
      <div class="form-group">
        <label for="shop_id">Shop <span class="required">*</span></label>
        <select 
          id="shop_id" 
          name="shop_id" 
          [(ngModel)]="contract.shop_id" 
          required
          [disabled]="isEditMode">
          <option value="">-- Select Shop --</option>
          <option *ngFor="let shop of shops" [value]="shop._id">
            {{ shop.shop_name }}
          </option>
        </select>
        <small *ngIf="isEditMode" class="help-text">Shop cannot be changed in edit mode</small>
      </div>

      <!-- Date Range -->
      <div class="form-row">
        <div class="form-group">
          <label for="start_date">Start Date <span class="required">*</span></label>
          <input 
            type="date" 
            id="start_date" 
            name="start_date" 
            [(ngModel)]="contract.start_date" 
            required
          />
        </div>

        <div class="form-group">
          <label for="end_date">End Date <span class="required">*</span></label>
          <input 
            type="date" 
            id="end_date" 
            name="end_date" 
            [(ngModel)]="contract.end_date" 
            required
          />
        </div>
      </div>

      <!-- Financial Info -->
      <div class="form-row">
        <div class="form-group">
          <label for="rent_amount">Rent Amount (€) <span class="required">*</span></label>
          <input 
            type="number" 
            id="rent_amount" 
            name="rent_amount" 
            [(ngModel)]="contract.rent_amount" 
            step="0.01"
            min="0"
            required
            placeholder="0.00"
          />
        </div>

        <div class="form-group">
          <label for="payment_frequency">Payment Frequency <span class="required">*</span></label>
          <select 
            id="payment_frequency" 
            name="payment_frequency" 
            [(ngModel)]="contract.payment_frequency" 
            required>
            <option value="monthly">Monthly</option>
            <option value="quarterly">Quarterly</option>
          </select>
        </div>
      </div>

      <!-- Status (only on edit) -->
      <div class="form-group" *ngIf="isEditMode">
        <label for="status">Status</label>
        <select 
          id="status" 
          name="status" 
          [(ngModel)]="contract.current_status!.status">
          <option value="signed">Signed</option>
          <option value="active">Active</option>
          <option value="expired">Expired</option>
          <option value="terminated">Terminated</option>
        </select>
      </div>

      <!-- Status Reason (only on edit) -->
      <div class="form-group" *ngIf="isEditMode">
        <label for="status_reason">Status Change Reason (Optional)</label>
        <input 
          type="text" 
          id="status_reason" 
          name="status_reason" 
          [(ngModel)]="statusReason"
          placeholder="Enter reason for status change..."
        />
      </div>

      <!-- Special Conditions -->
      <div class="form-group">
        <label for="special_conditions">Special Conditions</label>
        <textarea 
          id="special_conditions" 
          name="special_conditions" 
          [(ngModel)]="contract.special_conditions"
          rows="4"
          placeholder="Enter any special conditions or notes..."
        ></textarea>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button 
          type="button" 
          class="btn-secondary" 
          (click)="cancel()"
          [disabled]="submitting">
          Cancel
        </button>
        <button 
          type="submit" 
          class="btn-primary" 
          [disabled]="submitting || !contractForm.valid">
          {{ submitting ? 'Saving...' : (isEditMode ? 'Update Contract' : 'Create Contract') }}
        </button>
      </div>
    </form>
  </div>
</div>
