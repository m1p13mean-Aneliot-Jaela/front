<div class="shop-layout" [class.collapsed]="sidebarCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="icon">🏪</span>
        <span class="text">Shop</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span>{{ sidebarCollapsed ? '→' : '←' }}</span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div *ngFor="let item of menuItems" class="menu-item">
        <!-- Menu with children (expandable) -->
        <div *ngIf="item.children; else simpleLink" class="expandable">
          <div class="nav-item" (click)="toggleMenu(item)">
            <span class="icon">{{ item.icon }}</span>
            <span class="label">{{ item.label }}</span>
            <span class="arrow" [class.expanded]="item.expanded">▼</span>
          </div>
          <!-- Submenu -->
          <div class="submenu" [class.expanded]="item.expanded">
            <a 
              *ngFor="let child of item.children" 
              [routerLink]="child.route"
              class="submenu-item"
              routerLinkActive="active"
            >
              {{ child.label }}
            </a>
          </div>
        </div>
        
        <!-- Simple menu item (no children) -->
        <ng-template #simpleLink>
          <a 
            [routerLink]="item.route"
            class="nav-item"
            routerLinkActive="active"
          >
            <span class="icon">{{ item.icon }}</span>
            <span class="label">{{ item.label }}</span>
          </a>
        </ng-template>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span class="icon">�</span>
        <span class="label">Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="header">
      <h1>Tableau de bord Boutique</h1>
      <div class="user-info" *ngIf="user$ | async as user">
        <span class="badge shop">Shop</span>
        <span class="name">{{ user.first_name }} {{ user.last_name }}</span>
        <div class="avatar">{{ user.first_name?.charAt(0) || '?' }}</div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
