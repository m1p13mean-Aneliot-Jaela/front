<div class="client-layout">
  <header class="header">
    <div class="header-container">
      <div class="brand">
        <span class="logo">🛍️</span>
        <span class="brand-text">Shopping App</span>
      </div>

      <nav class="nav">
        <a *ngFor="let item of navItems" [routerLink]="item.route" class="nav-item">
          {{ item.label }}
        </a>
      </nav>

      <button class="nav-item logout" (click)="logout()">Déconnexion</button>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
