<div class="client-layout">
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <div class="brand">
        <span class="logo">🛍️</span>
        <span class="brand-text">Shopping App</span>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Rechercher des produits, boutiques...">
      </div>

      <!-- Actions -->
      <div class="header-actions">
        <button class="action-btn cart">
          <span>🛒</span>
          <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </button>
        <div class="user-menu" *ngIf="user$ | async as user">
          <span class="user-badge">CLIENT</span>
          <div class="avatar">{{ user.name.charAt(0) }}</div>
        </div>
        <button class="mobile-toggle" (click)="toggleMobileMenu()">
          <span>{{ mobileMenuOpen ? '✕' : '☰' }}</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="main-nav" [class.open]="mobileMenuOpen">
    <div class="nav-container">
      <a *ngFor="let item of navItems" [routerLink]="item.route" class="nav-item">
        <span class="icon">{{ item.icon }}</span>
        <span class="label">{{ item.label }}</span>
      </a>
      <button class="nav-item logout" (click)="logout()">
        <span class="icon">🚪</span>
        <span class="label">Déconnexion</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Bottom Navigation (Mobile) -->
  <nav class="bottom-nav">
    <a *ngFor="let item of navItems.slice(0, 4)" [routerLink]="item.route" class="bottom-item">
      <span class="icon">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </a>
    <button class="bottom-item" (click)="logout()">
      <span class="icon">🚪</span>
      <span class="label">Sortir</span>
    </button>
  </nav>
</div>
