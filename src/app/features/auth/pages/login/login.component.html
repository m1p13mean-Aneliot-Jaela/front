<div class="login-container">
  <div class="login-left">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <h1>Centre Commercial</h1>
      <p>Votre destination shopping unique</p>
    </div>
    <div class="features">
      <div class="feature">
        <span class="icon">🛍️</span>
        <span>Shopping moderne</span>
      </div>
      <div class="feature">
        <span class="icon">⚡</span>
        <span>Expérience fluide</span>
      </div>
      <div class="feature">
        <span class="icon">🔒</span>
        <span>Sécurisé & fiable</span>
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-box">
      <h2>Connexion</h2>
      <p class="subtitle">Connectez-vous pour continuer</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="votre@email.com"
            [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          >
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox">
            <span>Se souvenir de moi</span>
          </label>
          <a href="#" class="forgot">Mot de passe oublié ?</a>
        </div>

        <div *ngIf="error" class="error-message">{{ error }}</div>

        <button type="submit" class="btn-login" [disabled]="loading || loginForm.invalid">
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>

      <div class="demo-info">
        <p>
          <span>Pas encore de compte ?</span>
          <a routerLink="/login/signup">Créer un compte</a>
        </p>
      </div>
    </div>
  </div>
</div>
