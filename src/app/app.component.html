<!-- Backend Initialization Loading Screen -->
<div *ngIf="!isBackendReady" class="initialization-overlay">
  <div class="initialization-content">
    <div class="spinner"></div>
    <h2>Preparing Your Experience</h2>
    <p>{{ initializationMessage }}</p>
    <div class="loading-info">
      <small *ngIf="!backendError">This may take ~30 seconds on first load...</small>
      <small *ngIf="backendError" class="error-text">Connection issue detected. Retrying...</small>
    </div>
  </div>
</div>

<!-- Main Application -->
<div *ngIf="isBackendReady" class="app-container">
  <router-outlet></router-outlet>
</div>
